name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: weekly_report_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test1234
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test1234@localhost:5432/weekly_report_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-key
      JWT_REFRESH_SECRET: ci-test-refresh-secret-key
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Prisma migrations
        working-directory: packages/backend
        run: bunx prisma migrate deploy

      - name: Run Prisma seed
        working-directory: packages/backend
        run: bunx prisma db seed

      - name: Lint (Backend)
        working-directory: packages/backend
        run: bun run lint

      - name: Lint (Frontend)
        working-directory: packages/frontend
        run: bun run lint

      - name: Test (Backend unit)
        working-directory: packages/backend
        run: bun run test

      - name: Test (Frontend unit)
        working-directory: packages/frontend
        run: bun run test

      - name: Build (Backend)
        working-directory: packages/backend
        run: bun run build

      - name: Build (Frontend)
        working-directory: packages/frontend
        run: bun run build

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          target: production
          push: false
          tags: weekly-report/backend:ci

      - name: Build Frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          target: production
          push: false
          tags: weekly-report/frontend:ci
